<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las Aventuras de Zizi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- PANTALLA DE PRESENTACIÓN -->
    <div id="presentation">
        <!-- === IMAGEN DE FONDO CON MOVIMIENTO (NUEVO) === -->
        <div id="fondoMovil"></div>

        <!-- === CONTENIDO (FIJO) === -->
        <div class="presentation-content">
            <h1 class="game-title">⚡ ZIZI & Co. ADVENTURES ⚡</h1>
            <p class="game-subtitle">
               <span class="highlight">XIZI TIMBA AND CONQUER</span>
            </p>
            <div class="divider"></div>
            <button id="startBtn" class="start-button">🚗</button>
            <p class="credits">Powered by Tununu and Zizi engineers</p>
        </div>
    </div>

    <!-- El juego se cargará aquí -->
    <div id="gameContainer" style="display:none;"></div>

    <script>
        document.getElementById("startBtn").addEventListener("click", function() {
            document.getElementById("presentation").style.display = "none";
            document.getElementById("gameContainer").style.display = "block";
            loadGame();
        });

        function loadGame() {
            const iframe = document.createElement("iframe");
            iframe.src = "juego.html";
            iframe.style.width = "100%";
            iframe.style.height = "100vh";
            iframe.style.border = "none";
            iframe.style.position = "fixed";
            iframe.style.top = "0";
            iframe.style.left = "0";
            iframe.style.zIndex = "1000";
            document.getElementById("gameContainer").appendChild(iframe);
        }
    </script>
</body>
</html>
